<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      text { font-family: 'Inter', sans-serif; }
      .label { font-size: 13px; fill: #374151; font-weight: 500; }
      .input-box { fill: #fff; stroke: #d1d5db; rx: 8; }
      .input-box-active { fill: #fff; stroke: #6366f1; rx: 8; }
      .btn-primary { fill: #6366f1; rx: 8; }
      .btn-outline { fill: none; stroke: #d1d5db; rx: 8; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="1440" height="900" fill="#fafafa"/>
  <!-- Vertical Step Indicator (left side) -->
  <g transform="translate(260, 220)">
    <!-- Step 1 - completed -->
    <circle cx="12" cy="0" r="12" fill="#10b981"/>
    <text x="12" y="4" text-anchor="middle" font-size="11" fill="#fff" font-family="Inter">✓</text>
    <text x="32" y="5" font-size="13" fill="#374151" font-family="Inter">Bem-vindo</text>
    <line x1="12" y1="12" x2="12" y2="60" stroke="#10b981" stroke-width="2"/>
    <!-- Step 2 - active -->
    <circle cx="12" cy="72" r="12" fill="#6366f1"/>
    <text x="12" y="76" text-anchor="middle" font-size="11" fill="#fff" font-family="Inter" font-weight="600">2</text>
    <text x="32" y="77" font-size="13" fill="#6366f1" font-family="Inter" font-weight="600">Empresa</text>
    <line x1="12" y1="84" x2="12" y2="132" stroke="#e5e7eb" stroke-width="2"/>
    <!-- Step 3 -->
    <circle cx="12" cy="144" r="12" fill="none" stroke="#d1d5db" stroke-width="2"/>
    <text x="12" y="148" text-anchor="middle" font-size="11" fill="#9ca3af" font-family="Inter">3</text>
    <text x="32" y="149" font-size="13" fill="#9ca3af" font-family="Inter">WhatsApp</text>
    <line x1="12" y1="156" x2="12" y2="204" stroke="#e5e7eb" stroke-width="2"/>
    <!-- Step 4 -->
    <circle cx="12" cy="216" r="12" fill="none" stroke="#d1d5db" stroke-width="2"/>
    <text x="12" y="220" text-anchor="middle" font-size="11" fill="#9ca3af" font-family="Inter">4</text>
    <text x="32" y="221" font-size="13" fill="#9ca3af" font-family="Inter">Equipe</text>
    <line x1="12" y1="228" x2="12" y2="276" stroke="#e5e7eb" stroke-width="2"/>
    <!-- Step 5 -->
    <circle cx="12" cy="288" r="12" fill="none" stroke="#d1d5db" stroke-width="2"/>
    <text x="12" y="292" text-anchor="middle" font-size="11" fill="#9ca3af" font-family="Inter">5</text>
    <text x="32" y="293" font-size="13" fill="#9ca3af" font-family="Inter">Concluído</text>
  </g>
  <!-- Centered Card -->
  <rect x="420" y="120" width="600" height="660" rx="16" fill="#fff" stroke="#e5e7eb"/>
  <!-- Progress bar -->
  <rect x="460" y="156" width="520" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="460" y="156" width="208" height="6" rx="3" fill="#6366f1"/>
  <!-- Step text -->
  <text x="720" y="190" text-anchor="middle" font-size="13" fill="#6b7280" font-family="Inter">Passo 2 de 5</text>
  <!-- Step dots -->
  <g transform="translate(680, 206)">
    <circle cx="-24" cy="0" r="4" fill="#6366f1"/>
    <circle cx="-8" cy="0" r="4" fill="#6366f1"/>
    <circle cx="8" cy="0" r="4" fill="#d1d5db"/>
    <circle cx="24" cy="0" r="4" fill="#d1d5db"/>
    <circle cx="40" cy="0" r="4" fill="#d1d5db"/>
  </g>
  <!-- Title -->
  <text x="720" y="260" text-anchor="middle" font-size="24" fill="#111827" font-family="Inter" font-weight="700">Sobre sua empresa</text>
  <text x="720" y="284" text-anchor="middle" font-size="14" fill="#6b7280" font-family="Inter">Preencha as informações da sua empresa</text>
  <!-- Form: Nome da Empresa -->
  <text x="480" y="330" class="label" font-family="Inter">Nome da Empresa</text>
  <rect x="480" y="340" width="480" height="44" class="input-box"/>
  <text x="496" y="367" font-size="14" fill="#9ca3af" font-family="Inter">Ex: Minha Empresa Ltda</text>
  <!-- Form: Telefone -->
  <text x="480" y="416" class="label" font-family="Inter">Telefone</text>
  <rect x="480" y="426" width="480" height="44" class="input-box"/>
  <text x="496" y="453" font-size="14" fill="#9ca3af" font-family="Inter">(11) 99999-9999</text>
  <!-- Form: Segmento -->
  <text x="480" y="502" class="label" font-family="Inter">Segmento</text>
  <rect x="480" y="512" width="480" height="44" class="input-box"/>
  <text x="496" y="539" font-size="14" fill="#374151" font-family="Inter">Selecione o segmento</text>
  <!-- Dropdown arrow -->
  <path d="M940 532 l6 -6 l-12 0 z" fill="#9ca3af" transform="rotate(180 940 530)"/>
  <!-- Dropdown options (visible) -->
  <rect x="480" y="558" width="480" height="120" rx="8" fill="#fff" stroke="#e5e7eb" filter="url(#shadow)"/>
  <rect x="480" y="558" width="480" height="40" rx="8" fill="#eef2ff"/>
  <text x="500" y="583" font-size="14" fill="#6366f1" font-family="Inter" font-weight="500">Varejo</text>
  <text x="500" y="623" font-size="14" fill="#374151" font-family="Inter">Serviços</text>
  <text x="500" y="663" font-size="14" fill="#374151" font-family="Inter">Alimentação</text>
  <!-- Buttons -->
  <rect x="480" y="710" width="120" height="44" class="btn-outline" rx="8"/>
  <text x="540" y="737" text-anchor="middle" font-size="14" fill="#374151" font-family="Inter" font-weight="500">Voltar</text>
  <rect x="840" y="710" width="120" height="44" class="btn-primary" rx="8"/>
  <text x="900" y="737" text-anchor="middle" font-size="14" fill="#fff" font-family="Inter" font-weight="500">Próximo</text>
  <!-- OmniFlow logo top -->
  <text x="720" y="60" text-anchor="middle" font-size="20" fill="#6366f1" font-family="Inter" font-weight="700">OmniFlow</text>
  <text x="720" y="80" text-anchor="middle" font-size="12" fill="#9ca3af" font-family="Inter">Configure sua conta em poucos passos</text>
</svg>