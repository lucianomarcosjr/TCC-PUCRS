    <line x1="40" y1="570" x2="40" y2="610" stroke="#e5e7eb" stroke-width="2"/>
    <text x="60" y="560" font-size="13" fill="#111827" font-family="Inter" font-weight="500">Conversa finalizada via WhatsApp</text>
