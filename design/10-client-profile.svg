    <text x="60" y="630" font-size="12" fill="#9ca3af" font-family="Inter">Ontem às 14:30 • Por: João Silva</text>
    <!-- Item 3 -->
    <circle cx="40" cy="668" r="6" fill="#8b5cf6"/>
    <text x="60" y="664" font-size="13" fill="#111827" font-family="Inter" font-weight="500">Nota adicionada ao perfil</text>
    <text x="60" y="682" font-size="12" fill="#9ca3af" font-family="Inter">23 Dez 2024 • Por: Maria Santos</text>
