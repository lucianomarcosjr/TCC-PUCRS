<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text{font-family:'Inter',sans-serif}
    </style>
  </defs>
  <rect width="1440" height="900" fill="#fafafa"/>
  <!-- Sidebar -->
  <rect width="260" height="900" fill="#111827"/>
  <text x="32" y="40" fill="#fff" font-size="22" font-weight="700">🌀 OmniFlow</text>
  <text x="32" y="58" fill="#9ca3af" font-size="11">Plataforma de Atendimento</text>
  <line x1="20" y1="70" x2="240" y2="70" stroke="#1f2937" stroke-width="1"/>
  <g fill="#9ca3af" font-size="14">
    <rect x="12" y="80" width="236" height="38" rx="8" fill="transparent"/>
    <text x="44" y="104">💬  Conversas</text>
    <rect x="12" y="122" width="236" height="38" rx="8" fill="transparent"/>
    <text x="44" y="146">👥  Clientes</text>
    <rect x="12" y="164" width="236" height="38" rx="8" fill="transparent"/>
    <text x="44" y="188">📊  Analytics</text>
    <rect x="12" y="206" width="236" height="38" rx="8" fill="transparent"/>
    <text x="44" y="230">🔔  Notificações</text>
    <rect x="12" y="248" width="236" height="38" rx="8" fill="transparent"/>
    <text x="44" y="272">⚡  Automações</text>
    <rect x="12" y="290" width="236" height="38" rx="8" fill="transparent"/>
    <text x="44" y="314">📋  Relatórios</text>
  </g>
  <line x1="20" y1="342" x2="240" y2="342" stroke="#1f2937" stroke-width="1"/>
  <g fill="#9ca3af" font-size="14">
    <rect x="12" y="354" width="236" height="38" rx="8" fill="#6366f1" opacity="0.15"/>
    <text x="44" y="378" fill="#818cf8">⚙️  Configurações</text>
    <rect x="12" y="396" width="236" height="38" rx="8" fill="transparent"/>
    <text x="44" y="420">👤  Perfil</text>
    <rect x="12" y="438" width="236" height="38" rx="8" fill="transparent"/>
    <text x="44" y="462">❓  Ajuda</text>
  </g>
  <rect x="12" y="840" width="236" height="50" rx="10" fill="#1f2937"/>
  <circle cx="40" cy="865" r="16" fill="#6366f1"/>
  <text x="34" y="870" fill="#fff" font-size="11" font-weight="600">LC</text>
  <text x="62" y="860" fill="#fff" font-size="13" font-weight="500">Luciano Costa</text>
  <text x="62" y="876" fill="#9ca3af" font-size="11">Admin</text>

  <!-- Breadcrumb -->
  <text x="292" y="36" fill="#9ca3af" font-size="13">Dashboard</text>
  <text x="360" y="36" fill="#9ca3af" font-size="13">&gt;</text>
  <text x="376" y="36" fill="#9ca3af" font-size="13">Configurações</text>
  <text x="468" y="36" fill="#9ca3af" font-size="13">&gt;</text>
  <text x="484" y="36" fill="#6366f1" font-size="13" font-weight="500">Perfil</text>

  <!-- Settings Sidebar -->
  <rect x="280" y="56" width="220" height="500" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="300" y="88" fill="#111827" font-size="14" font-weight="600">Configurações</text>
  <!-- Active item -->
  <rect x="292" y="100" width="196" height="38" rx="8" fill="#eef2ff"/>
  <text x="316" y="124" fill="#6366f1" font-size="13" font-weight="600">👤  Perfil</text>
  <rect x="292" y="142" width="196" height="38" rx="8" fill="transparent"/>
  <text x="316" y="166" fill="#6b7280" font-size="13">🏢  Empresa</text>
  <rect x="292" y="184" width="196" height="38" rx="8" fill="transparent"/>
  <text x="316" y="208" fill="#6b7280" font-size="13">🔔  Notificações</text>
  <rect x="292" y="226" width="196" height="38" rx="8" fill="transparent"/>
  <text x="316" y="250" fill="#6b7280" font-size="13">🔗  Integrações</text>
  <rect x="292" y="268" width="196" height="38" rx="8" fill="transparent"/>
  <text x="316" y="292" fill="#6b7280" font-size="13">🔒  Segurança</text>
  <rect x="292" y="310" width="196" height="38" rx="8" fill="transparent"/>
  <text x="316" y="334" fill="#6b7280" font-size="13">💳  Faturamento</text>
  <rect x="292" y="352" width="196" height="38" rx="8" fill="transparent"/>
  <text x="316" y="376" fill="#6b7280" font-size="13">🤖  API</text>

