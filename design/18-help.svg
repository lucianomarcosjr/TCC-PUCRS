<text x="272" y="480" fill="#111827" font-size="18" font-weight="700">Perguntas Frequentes</text>
<!-- FAQ 1 -->
<rect x="272" y="496" width="924" height="70" rx="10" fill="#fff" stroke="#e5e7eb"/>
<text x="296" y="522" fill="#111827" font-size="14" font-weight="600">Como conectar WhatsApp?</text>
<text x="296" y="544" fill="#6b7280" font-size="13">Acesse Configurações &gt; Integrações &gt; WhatsApp e siga o passo a passo para conectar via QR Code.</text>
<text x="1168" y="522" fill="#9ca3af" font-size="16">▾</text>
<!-- FAQ 2 -->
<rect x="272" y="578" width="924" height="70" rx="10" fill="#fff" stroke="#e5e7eb"/>
<text x="296" y="604" fill="#111827" font-size="14" font-weight="600">Como adicionar usuários?</text>
<text x="296" y="626" fill="#6b7280" font-size="13">Vá em Configurações &gt; Equipe &gt; Convidar Membro e insira o email do novo usuário.</text>
<text x="1168" y="604" fill="#9ca3af" font-size="16">▾</text>
<!-- FAQ 3 -->
<rect x="272" y="660" width="924" height="70" rx="10" fill="#fff" stroke="#e5e7eb"/>
<text x="296" y="686" fill="#111827" font-size="14" font-weight="600">Como exportar relatórios?</text>
<text x="296" y="708" fill="#6b7280" font-size="13">Em Relatórios, selecione o período desejado e clique em Exportar para baixar em PDF ou CSV.</text>
<text x="1168" y="686" fill="#9ca3af" font-size="16">▾</text>
