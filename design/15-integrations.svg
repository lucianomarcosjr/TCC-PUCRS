<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs><style>text{font-family:'Inter',sans-serif}</style></defs>
  <rect width="1440" height="900" fill="#fafafa"/>
  <!-- Sidebar -->
  <rect width="240" height="900" fill="#111827"/>
  <text x="28" y="40" fill="#fff" font-size="20" font-weight="700">🌀 OmniFlow</text>
