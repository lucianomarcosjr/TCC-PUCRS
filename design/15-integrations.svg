      <rect width="540" height="130" rx="12" fill="#fff" stroke="#e5e7eb"/>
      <text x="24" y="36" font-size="28">📧</text>
      <text x="64" y="36" fill="#111827" font-size="16" font-weight="700">Email (SMTP)</text>
      <text x="64" y="56" fill="#6b7280" font-size="12">Conecte sua caixa de e-mail via SMTP/IMAP</text>
      <rect x="64" y="70" width="80" height="22" rx="11" fill="#f3f4f6"/>
      <text x="104" y="85" fill="#9ca3af" font-size="11" font-weight="600" text-anchor="middle">Em breve</text>
      <rect x="390" y="68" width="120" height="32" rx="8" fill="#f3f4f6"/>
      <text x="450" y="89" fill="#d1d5db" font-size="12" text-anchor="middle">Conectar</text>
    </g>

    <!-- Row 3 -->
    <!-- Zapier -->
    <g transform="translate(32,436)">
      <rect width="540" height="130" rx="12" fill="#fff" stroke="#e5e7eb"/>
      <text x="24" y="36" font-size="28">⚡</text>
      <text x="64" y="36" fill="#111827" font-size="16" font-weight="700">Zapier</text>
      <text x="64" y="56" fill="#6b7280" font-size="12">Conecte com milhares de apps via Zapier</text>
      <rect x="64" y="70" width="80" height="22" rx="11" fill="#f3f4f6"/>
      <text x="104" y="85" fill="#9ca3af" font-size="11" font-weight="600" text-anchor="middle">Em breve</text>
      <rect x="390" y="68" width="120" height="32" rx="8" fill="#f3f4f6"/>
      <text x="450" y="89" fill="#d1d5db" font-size="12" text-anchor="middle">Conectar</text>
    </g>

    <!-- Webhooks -->
    <g transform="translate(592,436)">
      <rect width="540" height="130" rx="12" fill="#fff" stroke="#e5e7eb"/>
      <text x="24" y="36" font-size="28">🔗</text>
      <text x="64" y="36" fill="#111827" font-size="16" font-weight="700">Webhooks</text>
      <text x="64" y="56" fill="#6b7280" font-size="12">Configure webhooks para integrações customizadas</text>
      <rect x="64" y="70" width="80" height="22" rx="11" fill="#f3f4f6"/>
      <text x="104" y="85" fill="#9ca3af" font-size="11" font-weight="600" text-anchor="middle">Em breve</text>
      <rect x="390" y="68" width="120" height="32" rx="8" fill="#f3f4f6"/>
      <text x="450" y="89" fill="#d1d5db" font-size="12" text-anchor="middle">Conectar</text>
    </g>

    <!-- Documentation Link -->
    <g transform="translate(32,590)">
      <rect width="1100" height="70" rx="12" fill="#fff" stroke="#e5e7eb"/>
      <text x="24" y="28" fill="#111827" font-size="15" font-weight="600">📚 Documentação de Integrações</text>
      <text x="24" y="50" fill="#6b7280" font-size="12">Consulte nossa documentação completa para configurar integrações via API e webhooks</text>
      <text x="1020" y="40" fill="#6366f1" font-size="13" font-weight="600" text-decoration="underline">Ver docs →</text>
    </g>
