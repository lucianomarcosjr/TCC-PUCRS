      <rect width="540" height="130" rx="12" fill="#fff" stroke="#e5e7eb"/>
      <text x="24" y="36" font-size="28">💬</text>
      <text x="64" y="36" fill="#111827" font-size="16" font-weight="700">Facebook Messenger</text>
      <text x="64" y="56" fill="#6b7280" font-size="12">Integre com o Messenger da sua página</text>
      <rect x="64" y="70" width="80" height="22" rx="11" fill="#f3f4f6"/>
      <text x="104" y="85" fill="#9ca3af" font-size="11" font-weight="600" text-anchor="middle">Em breve</text>
      <rect x="390" y="68" width="120" height="32" rx="8" fill="#f3f4f6"/>
      <text x="450" y="89" fill="#d1d5db" font-size="12" text-anchor="middle">Conectar</text>
    </g>

