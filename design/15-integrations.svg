    <text x="32" y="35" fill="#9ca3af" font-size="12">Dashboard &gt; Integrações</text>

    <text x="32" y="100" fill="#111827" font-size="24" font-weight="700">Integrações</text>
    <text x="32" y="120" fill="#6b7280" font-size="13">Conecte o OmniFlow com suas ferramentas</text>

    <!-- Integration Cards Grid -->
    <!-- Row 1 -->
    <!-- WhatsApp - Connected -->
    <g transform="translate(32,144)">
      <rect width="540" height="130" rx="12" fill="#fff" stroke="#e5e7eb"/>
      <text x="24" y="36" font-size="28">📱</text>
      <text x="64" y="36" fill="#111827" font-size="16" font-weight="700">WhatsApp</text>
      <text x="64" y="56" fill="#6b7280" font-size="12">Receba e envie mensagens via WhatsApp Business API</text>
      <rect x="64" y="70" width="80" height="22" rx="11" fill="#d1fae5"/>
      <text x="104" y="85" fill="#059669" font-size="11" font-weight="600" text-anchor="middle">Conectado</text>
      <rect x="390" y="68" width="120" height="32" rx="8" fill="none" stroke="#fecaca"/>
      <text x="450" y="89" fill="#ef4444" font-size="12" text-anchor="middle">Desconectar</text>
    </g>

    <!-- Instagram Direct - Coming soon -->
    <g transform="translate(592,144)">
      <rect width="540" height="130" rx="12" fill="#fff" stroke="#e5e7eb"/>
      <text x="24" y="36" font-size="28">📷</text>
      <text x="64" y="36" fill="#111827" font-size="16" font-weight="700">Instagram Direct</text>
      <text x="64" y="56" fill="#6b7280" font-size="12">Gerencie mensagens do Instagram Direct</text>
      <rect x="64" y="70" width="80" height="22" rx="11" fill="#f3f4f6"/>
      <text x="104" y="85" fill="#9ca3af" font-size="11" font-weight="600" text-anchor="middle">Em breve</text>
      <rect x="390" y="68" width="120" height="32" rx="8" fill="#f3f4f6"/>
      <text x="450" y="89" fill="#d1d5db" font-size="12" text-anchor="middle">Conectar</text>
    </g>

    <!-- Row 2 -->
    <!-- Facebook Messenger -->
