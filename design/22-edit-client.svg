<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" font-family="Inter, sans-serif">
  <defs>
    <clipPath id="clip"><rect width="1440" height="900" rx="8"/></clipPath>
    <style>
      text { fill: #1f2937; }
      .sidebar-text { fill: #9ca3af; font-size: 13px; }
      .sidebar-active { fill: #ffffff; font-size: 13px; }
      .label { font-size: 13px; fill: #374151; font-weight: 500; }
      .input-text { font-size: 13px; fill: #111827; }
      .breadcrumb { font-size: 12px; fill: #6b7280; }
      .breadcrumb-active { font-size: 12px; fill: #6366f1; }
    </style>
  </defs>
  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="1440" height="900" fill="#fafafa"/>

    <!-- Dark Sidebar -->
    <rect width="240" height="900" fill="#111827"/>
    <text x="24" y="36" font-size="20" font-weight="700" fill="#6366f1">⚡ OmniFlow</text>
    <line x1="16" y1="52" x2="224" y2="52" stroke="#1f2937" stroke-width="1"/>

    <text x="24" y="80" class="sidebar-text">💬  Conversas</text>
    <!-- Clientes active -->
    <rect x="8" y="92" width="224" height="32" rx="6" fill="#6366f1" opacity="0.15"/>
    <text x="24" y="112" class="sidebar-active" fill="#6366f1" font-weight="600">👥  Clientes</text>
    <text x="24" y="144" class="sidebar-text">📊  Analytics</text>
    <text x="24" y="176" class="sidebar-text">🔔  Notificações</text>
    <text x="24" y="208" class="sidebar-text">⚡  Automações</text>
    <text x="24" y="240" class="sidebar-text">📄  Relatórios</text>

    <line x1="16" y1="260" x2="224" y2="260" stroke="#1f2937" stroke-width="1"/>

    <text x="24" y="288" class="sidebar-text">⚙️  Configurações</text>
    <text x="24" y="320" class="sidebar-text">👤  Perfil</text>
    <text x="24" y="352" class="sidebar-text">❓  Ajuda</text>

    <!-- User card -->
    <rect x="8" y="848" width="224" height="44" rx="8" fill="#1f2937"/>
    <circle cx="30" cy="870" r="14" fill="#6366f1"/>
    <text x="30" y="874" font-size="11" fill="white" text-anchor="middle">LC</text>
    <text x="52" y="865" font-size="12" fill="#ffffff" font-weight="500">Luciano Costa</text>
    <text x="52" y="880" font-size="10" fill="#9ca3af">luciano@omniflow.io</text>

    <!-- Main Content Area -->
    <!-- Breadcrumb -->
    <text x="272" y="32" class="breadcrumb">Dashboard  ›  Clientes  ›  Ana Costa  ›  <tspan class="breadcrumb-active">Editar</tspan></text>

    <!-- Header -->
    <text x="272" y="68" font-size="14" fill="#6366f1" font-weight="500">←  Voltar</text>
    <text x="272" y="100" font-size="22" font-weight="700" fill="#111827">Editar Cliente</text>

    <!-- White Card Form -->
    <rect x="272" y="120" width="900" height="660" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

    <!-- Nome -->
    <text x="304" y="160" class="label">Nome Completo</text>
    <rect x="304" y="168" width="420" height="38" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="316" y="192" class="input-text">Ana Costa</text>

    <!-- Telefone -->
    <text x="744" y="160" class="label">Telefone</text>
    <rect x="744" y="168" width="400" height="38" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="756" y="192" class="input-text">+55 11 98765-4321</text>

    <!-- Email -->
    <text x="304" y="232" class="label">Email</text>
    <rect x="304" y="240" width="420" height="38" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="316" y="264" class="input-text">ana.costa@email.com</text>

    <!-- Tags -->
    <text x="744" y="232" class="label">Tags</text>
    <rect x="744" y="240" width="400" height="38" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <!-- Tag pills inside input -->
    <rect x="752" y="248" width="40" height="22" rx="11" fill="#eef2ff"/>
    <text x="772" y="263" font-size="11" fill="#6366f1" text-anchor="middle">vip</text>
    <rect x="800" y="248" width="68" height="22" rx="11" fill="#eef2ff"/>
    <text x="834" y="263" font-size="11" fill="#6366f1" text-anchor="middle">premium</text>

    <!-- Notas -->
    <text x="304" y="306" class="label">Notas</text>
    <rect x="304" y="314" width="840" height="120" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="316" y="340" class="input-text">Cliente VIP desde 2023. Prefere atendimento via WhatsApp.</text>
    <text x="316" y="360" class="input-text">Compras frequentes na categoria eletrônicos.</text>

    <!-- Footer Buttons -->
    <rect x="304" y="720" width="120" height="40" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="364" y="745" font-size="14" fill="#374151" font-weight="500" text-anchor="middle">Cancelar</text>

    <rect x="440" y="720" width="170" height="40" rx="8" fill="#6366f1"/>
    <text x="525" y="745" font-size="14" fill="#ffffff" font-weight="600" text-anchor="middle">Salvar Alterações</text>
  </g>
</svg>