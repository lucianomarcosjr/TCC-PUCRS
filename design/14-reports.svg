        <line x1="16" y1="110" x2="1104" y2="110" stroke="#f3f4f6"/>
        <text x="24" y="138" fill="#374151">02/01/2025</text><text x="240" y="138" fill="#374151">38</text><text x="440" y="138" fill="#374151">152</text><text x="660" y="138" fill="#374151">5m 10s</text><text x="900" y="138" fill="#10b981">91%</text>
        <line x1="16" y1="148" x2="1104" y2="148" stroke="#f3f4f6"/>
        <text x="24" y="176" fill="#374151">03/01/2025</text><text x="240" y="176" fill="#374151">45</text><text x="440" y="176" fill="#374151">201</text><text x="660" y="176" fill="#374151">3m 48s</text><text x="900" y="176" fill="#10b981">96%</text>
        <line x1="16" y1="186" x2="1104" y2="186" stroke="#f3f4f6"/>
        <text x="24" y="214" fill="#374151">04/01/2025</text><text x="240" y="214" fill="#374151">51</text><text x="440" y="214" fill="#374151">223</text><text x="660" y="214" fill="#374151">4m 05s</text><text x="900" y="214" fill="#10b981">89%</text>
        <line x1="16" y1="224" x2="1104" y2="224" stroke="#f3f4f6"/>
        <text x="24" y="252" fill="#374151">05/01/2025</text><text x="240" y="252" fill="#374151">36</text><text x="440" y="252" fill="#374151">144</text><text x="660" y="252" fill="#374151">6m 15s</text><text x="900" y="252" fill="#ef4444">85%</text>
      </g>
