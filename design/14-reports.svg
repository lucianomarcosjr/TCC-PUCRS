    <!-- Scheduled Reports -->
    <g transform="translate(32,736)">
      <rect width="1120" height="70" rx="12" fill="#fff" stroke="#e5e7eb"/>
      <text x="24" y="28" fill="#111827" font-size="15" font-weight="600">Relatórios Agendados</text>
      <text x="24" y="50" fill="#6b7280" font-size="12">Programe envios automáticos de relatórios por e-mail</text>
      <rect x="920" y="16" width="170" height="36" rx="8" fill="#eef2ff"/>
      <text x="1005" y="39" fill="#6366f1" font-size="13" font-weight="600" text-anchor="middle">+ Agendar Relatório</text>
