      <text x="440" y="65" fill="#6b7280" font-size="11" font-weight="600">Mensagens</text>
      <text x="660" y="65" fill="#6b7280" font-size="11" font-weight="600">Tempo Médio</text>
      <text x="900" y="65" fill="#6b7280" font-size="11" font-weight="600">Taxa Resolução</text>
      <!-- Rows -->
      <g font-size="12">
