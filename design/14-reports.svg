      <text x="788" y="23" fill="#9ca3af" font-size="10">▼</text>

      <rect x="822" width="260" height="36" rx="8" fill="#fff" stroke="#d1d5db"/>
      <text x="836" y="23" fill="#374151" font-size="12">Status: Todos</text>
      <text x="1062" y="23" fill="#9ca3af" font-size="10">▼</text>
