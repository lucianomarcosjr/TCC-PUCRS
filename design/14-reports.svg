      <line x1="50" y1="55" x2="1096" y2="55" stroke="#f3f4f6"/>
      <line x1="50" y1="105" x2="1096" y2="105" stroke="#f3f4f6"/>
      <line x1="50" y1="155" x2="1096" y2="155" stroke="#f3f4f6"/>
      <line x1="50" y1="195" x2="1096" y2="195" stroke="#e5e7eb"/>
      <!-- Area fill -->
      <polygon points="100,140 250,90 400,110 550,70 700,95 850,60 1000,80 1000,195 100,195" fill="#6366f1" opacity="0.08"/>
      <!-- Line -->
      <polyline points="100,140 250,90 400,110 550,70 700,95 850,60 1000,80" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Dots -->
      <circle cx="100" cy="140" r="4" fill="#6366f1"/>
      <circle cx="250" cy="90" r="4" fill="#6366f1"/>
      <circle cx="400" cy="110" r="4" fill="#6366f1"/>
      <circle cx="550" cy="70" r="4" fill="#6366f1"/>
      <circle cx="700" cy="95" r="4" fill="#6366f1"/>
      <circle cx="850" cy="60" r="4" fill="#6366f1"/>
      <circle cx="1000" cy="80" r="4" fill="#6366f1"/>
      <!-- X axis labels -->
      <text x="100" y="215" fill="#9ca3af" font-size="10" text-anchor="middle">Seg</text>
      <text x="250" y="215" fill="#9ca3af" font-size="10" text-anchor="middle">Ter</text>
      <text x="400" y="215" fill="#9ca3af" font-size="10" text-anchor="middle">Qua</text>
      <text x="550" y="215" fill="#9ca3af" font-size="10" text-anchor="middle">Qui</text>
      <text x="700" y="215" fill="#9ca3af" font-size="10" text-anchor="middle">Sex</text>
      <text x="850" y="215" fill="#9ca3af" font-size="10" text-anchor="middle">Sáb</text>
      <text x="1000" y="215" fill="#9ca3af" font-size="10" text-anchor="middle">Dom</text>
