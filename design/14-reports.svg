<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs><style>text{font-family:'Inter',sans-serif}</style></defs>
  <rect width="1440" height="900" fill="#fafafa"/>
  <!-- Sidebar -->
  <rect width="240" height="900" fill="#111827"/>
  <text x="28" y="40" fill="#fff" font-size="20" font-weight="700">🌀 OmniFlow</text>
  <line x1="16" y1="56" x2="224" y2="56" stroke="#1f2937"/>
  <g fill="#9ca3af" font-size="14">
    <text x="28" y="84">💬  Conversas</text>
    <text x="28" y="116">👥  Clientes</text>
    <text x="28" y="148">📊  Analytics</text>
    <text x="28" y="180">🔔  Notificações</text>
    <text x="28" y="212">⚡  Automações</text>
  </g>
  <rect x="8" y="222" width="224" height="36" rx="8" fill="#6366f1" opacity="0.15"/>
  <text x="28" y="245" fill="#6366f1" font-size="14" font-weight="600">📄  Relatórios</text>
  <line x1="16" y1="268" x2="224" y2="268" stroke="#1f2937"/>
  <g fill="#6b7280" font-size="13">
    <text x="28" y="296">⚙️  Configurações</text>
    <text x="28" y="324">👤  Perfil</text>
    <text x="28" y="352">❓  Ajuda</text>
  </g>
  <rect x="12" y="844" width="216" height="44" rx="10" fill="#1f2937"/>
  <circle cx="36" cy="866" r="14" fill="#6366f1"/>
  <text x="36" y="870" fill="#fff" font-size="10" text-anchor="middle">LF</text>
  <text x="58" y="862" fill="#e5e7eb" font-size="12" font-weight="600">Luciano F.</text>
  <text x="58" y="878" fill="#6b7280" font-size="10">Admin</text>

  <!-- Main -->
  <g transform="translate(240,0)">
    <rect width="1200" height="56" fill="#fff"/>
    <line x1="0" y1="56" x2="1200" y2="56" stroke="#e5e7eb"/>
    <text x="32" y="35" fill="#9ca3af" font-size="12">Dashboard &gt; Relatórios</text>

    <text x="32" y="100" fill="#111827" font-size="24" font-weight="700">Relatórios Avançados</text>
    <rect x="1040" y="78" width="120" height="36" rx="8" fill="#6366f1"/>
    <text x="1100" y="101" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">📥 Exportar</text>

    <!-- Filter Bar -->
    <g transform="translate(32,126)">
