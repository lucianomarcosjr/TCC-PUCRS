<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      text{font-family:'Inter',sans-serif}
    </style>
  </defs>
  <!-- BG -->
  <rect width="1440" height="900" fill="#fafafa"/>
  <!-- Sidebar -->
  <rect width="240" height="900" fill="#111827"/>
  <text x="28" y="40" fill="#fff" font-size="20" font-weight="700">🌀 OmniFlow</text>
  <line x1="16" y1="56" x2="224" y2="56" stroke="#1f2937" stroke-width="1"/>
  <!-- Nav Items -->
  <g fill="#9ca3af" font-size="14">
    <text x="28" y="84">💬  Conversas</text>
    <text x="28" y="116">👥  Clientes</text>
    <text x="28" y="148">📊  Analytics</text>
  </g>
  <!-- Active: Notificações -->
  <rect x="8" y="158" width="224" height="36" rx="8" fill="#6366f1" opacity="0.15"/>
  <text x="28" y="181" fill="#6366f1" font-size="14" font-weight="600">🔔  Notificações</text>
  <g fill="#9ca3af" font-size="14">
    <text x="28" y="213">⚡  Automações</text>
    <text x="28" y="245">📄  Relatórios</text>
  </g>
  <line x1="16" y1="268" x2="224" y2="268" stroke="#1f2937" stroke-width="1"/>
  <g fill="#6b7280" font-size="13">
    <text x="28" y="296">⚙️  Configurações</text>
    <text x="28" y="324">👤  Perfil</text>
    <text x="28" y="352">❓  Ajuda</text>
  </g>
  <!-- User Card -->
  <rect x="12" y="844" width="216" height="44" rx="10" fill="#1f2937"/>
  <circle cx="36" cy="866" r="14" fill="#6366f1"/>
  <text x="36" y="870" fill="#fff" font-size="10" text-anchor="middle">LF</text>
  <text x="58" y="862" fill="#e5e7eb" font-size="12" font-weight="600">Luciano F.</text>
  <text x="58" y="878" fill="#6b7280" font-size="10">Admin</text>

  <!-- Main Content -->
  <g transform="translate(240,0)">
    <!-- Top bar -->
    <rect width="1200" height="56" fill="#fff"/>
    <line x1="0" y1="56" x2="1200" y2="56" stroke="#e5e7eb"/>
    <text x="32" y="35" fill="#9ca3af" font-size="12">Dashboard &gt; Notificações</text>

    <!-- Header -->
    <text x="32" y="100" fill="#111827" font-size="24" font-weight="700">Notificações</text>
    <rect x="860" y="78" width="160" height="36" rx="8" fill="none" stroke="#d1d5db"/>
    <text x="940" y="101" fill="#6b7280" font-size="13" text-anchor="middle">Marcar todas como lidas</text>
    <rect x="1032" y="78" width="120" height="36" rx="8" fill="none" stroke="#d1d5db"/>
    <text x="1092" y="101" fill="#6b7280" font-size="13" text-anchor="middle">Limpar todas</text>

    <!-- Filter Tabs -->
    <g transform="translate(32,126)">
      <rect width="70" height="32" rx="6" fill="#6366f1"/>
      <text x="35" y="21" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Todas</text>
      <g transform="translate(82,0)">
        <rect width="110" height="32" rx="6" fill="#f3f4f6"/>
        <text x="42" y="21" fill="#374151" font-size="13">Não lidas</text>
        <rect x="88" y="6" width="18" height="18" rx="9" fill="#ef4444"/>
        <text x="97" y="19" fill="#fff" font-size="10" text-anchor="middle" font-weight="700">5</text>
      </g>
      <rect x="204" width="80" height="32" rx="6" fill="#f3f4f6"/>
      <text x="244" y="21" fill="#374151" font-size="13" text-anchor="middle">Menções</text>
    </g>

    <!-- Notification List -->
    <g transform="translate(32,180)">
      <!-- Item 1 - Unread message -->
      <rect x="-4" y="0" width="1130" height="80" rx="10" fill="#eef2ff"/>
      <circle cx="4" cy="40" r="4" fill="#6366f1"/>
      <circle cx="40" cy="40" r="20" fill="#dbeafe"/>
      <text x="40" y="46" font-size="16" text-anchor="middle">💬</text>
      <text x="72" y="30" fill="#111827" font-size="14" font-weight="600">Nova mensagem de Maria Silva</text>
      <text x="72" y="50" fill="#6b7280" font-size="13">"Olá, preciso de ajuda com meu pedido #4521..."</text>
      <text x="1060" y="30" fill="#9ca3af" font-size="11">2 min atrás</text>

      <!-- Item 2 - Unread assignment -->
      <rect x="-4" y="92" width="1130" height="80" rx="10" fill="#eef2ff"/>
      <circle cx="4" cy="132" r="4" fill="#6366f1"/>
      <circle cx="40" cy="132" r="20" fill="#d1fae5"/>
      <text x="40" y="138" font-size="16" text-anchor="middle">👤</text>
      <text x="72" y="122" fill="#111827" font-size="14" font-weight="600">Conversa atribuída a você</text>
      <text x="72" y="142" fill="#6b7280" font-size="13">João atribuiu a conversa #892 para você</text>
      <text x="1060" y="122" fill="#9ca3af" font-size="11">15 min atrás</text>

      <!-- Item 3 - Read mention -->
      <rect x="-4" y="184" width="1130" height="80" rx="10" fill="#fff" stroke="#f3f4f6"/>
      <circle cx="40" cy="224" r="20" fill="#ede9fe"/>
      <text x="40" y="230" font-size="16" text-anchor="middle">@</text>
      <text x="72" y="214" fill="#111827" font-size="14" font-weight="600">Carlos mencionou você</text>
      <text x="72" y="234" fill="#6b7280" font-size="13">"@luciano pode verificar esse ticket urgente?"</text>
      <text x="1060" y="214" fill="#9ca3af" font-size="11">1h atrás</text>

      <!-- Item 4 - Read message -->
      <rect x="-4" y="276" width="1130" height="80" rx="10" fill="#fff" stroke="#f3f4f6"/>
      <circle cx="40" cy="316" r="20" fill="#dbeafe"/>
      <text x="40" y="322" font-size="16" text-anchor="middle">💬</text>
      <text x="72" y="306" fill="#111827" font-size="14" font-weight="600">Resposta de Ana Costa</text>
      <text x="72" y="326" fill="#6b7280" font-size="13">"Obrigada pelo atendimento rápido!"</text>
      <text x="1060" y="306" fill="#9ca3af" font-size="11">3h atrás</text>

      <!-- Item 5 - Read assignment -->
      <rect x="-4" y="368" width="1130" height="80" rx="10" fill="#fff" stroke="#f3f4f6"/>
      <circle cx="40" cy="408" r="20" fill="#d1fae5"/>
      <text x="40" y="414" font-size="16" text-anchor="middle">👤</text>
      <text x="72" y="398" fill="#111827" font-size="14" font-weight="600">Novo cliente cadastrado</text>
      <text x="72" y="418" fill="#6b7280" font-size="13">Pedro Oliveira foi adicionado à base de clientes</text>
      <text x="1060" y="398" fill="#9ca3af" font-size="11">5h atrás</text>
    </g>

    <!-- Empty state hint -->
    <g transform="translate(500,680)">
      <text x="100" y="0" fill="#d1d5db" font-size="32" text-anchor="middle">🔔</text>
      <text x="100" y="28" fill="#9ca3af" font-size="13" text-anchor="middle">Você está em dia!</text>
    </g>
  </g>
</svg>
