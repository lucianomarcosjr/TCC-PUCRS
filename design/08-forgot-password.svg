<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text{font-family:'Inter',sans-serif}
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Left Side Gradient -->
  <rect width="720" height="900" fill="url(#bgGrad)"/>
  <!-- Logo -->
  <text x="60" y="60" fill="#fff" font-size="26" font-weight="700">🌀 OmniFlow</text>
  <!-- Center content on left -->
  <text x="360" y="380" fill="#fff" font-size="28" font-weight="700" text-anchor="middle">Recupere o acesso</text>
  <text x="360" y="414" fill="#fff" font-size="28" font-weight="700" text-anchor="middle">à sua conta</text>
  <text x="360" y="450" fill="rgba(255,255,255,0.7)" font-size="15" text-anchor="middle">Enviaremos um link seguro para redefinir sua senha</text>
  <!-- Lock illustration placeholder -->
  <circle cx="360" cy="560" r="60" fill="rgba(255,255,255,0.1)"/>
  <circle cx="360" cy="560" r="40" fill="rgba(255,255,255,0.1)"/>
  <text x="342" y="572" fill="rgba(255,255,255,0.8)" font-size="36">🔒</text>

  <!-- Right Side -->
  <rect x="720" y="0" width="720" height="900" fill="#fafafa"/>

  <!-- Centered Card -->
  <rect x="840" y="200" width="480" height="500" rx="16" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Back link -->
  <text x="872" y="244" fill="#6366f1" font-size="14" font-weight="500">← Voltar ao login</text>

  <!-- Lock icon circle -->
  <circle cx="1080" cy="300" r="36" fill="#eef2ff"/>
  <text x="1064" y="312" fill="#6366f1" font-size="32">🔒</text>

  <!-- Title -->
  <text x="1080" y="368" fill="#111827" font-size="24" font-weight="700" text-anchor="middle">Esqueceu sua senha?</text>

  <!-- Subtitle -->
  <text x="1080" y="396" fill="#6b7280" font-size="14" text-anchor="middle">Sem problemas! Digite seu email e enviaremos</text>
  <text x="1080" y="414" fill="#6b7280" font-size="14" text-anchor="middle">um link para redefinir.</text>

  <!-- Email field -->
  <text x="880" y="454" fill="#374151" font-size="13" font-weight="500">Email</text>
  <rect x="880" y="462" width="400" height="44" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="912" y="490" fill="#9ca3af" font-size="14">✉️  seu@email.com</text>

  <!-- Submit button -->
  <rect x="880" y="524" width="400" height="46" rx="10" fill="#6366f1"/>
  <text x="1080" y="553" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Enviar link de recuperação</text>

  <!-- Remember password link -->
  <text x="1010" y="598" fill="#6b7280" font-size="13">Lembrou a senha?</text>
  <text x="1130" y="598" fill="#6366f1" font-size="13" font-weight="600">Fazer login</text>

  <!-- Trust text -->
  <text x="1080" y="660" fill="#9ca3af" font-size="12" text-anchor="middle">🔒 Seus dados estão seguros conosco</text>
</svg>
