<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- LEFT SIDE 60% -->
  <rect width="864" height="900" fill="url(#grad)"/>

  <!-- Decorative circles -->
  <circle cx="750" cy="120" r="180" fill="#818cf8" opacity=".12"/>
  <circle cx="100" cy="780" r="140" fill="#818cf8" opacity=".1"/>
  <circle cx="680" cy="700" r="100" fill="#a5b4fc" opacity=".08"/>
  <circle cx="200" cy="200" r="60" fill="#c7d2fe" opacity=".1"/>
  <circle cx="500" cy="500" r="220" fill="#818cf8" opacity=".06"/>

  <!-- Logo -->
  <circle cx="80" cy="56" r="18" fill="white" opacity=".9"/>
  <text x="108" y="64" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="white">OmniFlow</text>

  <!-- Tagline -->
  <text x="80" y="340" font-family="Inter,sans-serif" font-size="38" font-weight="700" fill="white">Comece grátis</text>
  <text x="80" y="388" font-family="Inter,sans-serif" font-size="38" font-weight="700" fill="white">em 2 minutos</text>
  <text x="80" y="430" font-family="Inter,sans-serif" font-size="16" fill="#c7d2fe">Crie sua conta e comece a transformar seu atendimento</text>

  <!-- Benefit bullets -->
  <g font-family="Inter,sans-serif" font-size="16" fill="white">
    <circle cx="96" cy="490" r="14" fill="#818cf8"/>
    <text x="88" y="495" font-size="14" fill="white">✓</text>
    <text x="120" y="496">Sem cartão de crédito</text>

    <circle cx="96" cy="534" r="14" fill="#818cf8"/>
    <text x="88" y="539" font-size="14" fill="white">✓</text>
    <text x="120" y="540">14 dias de teste</text>

    <circle cx="96" cy="578" r="14" fill="#818cf8"/>
    <text x="88" y="583" font-size="14" fill="white">✓</text>
    <text x="120" y="584">Cancele quando quiser</text>
  </g>

  <!-- Decorative illustration placeholder -->
  <rect x="420" y="300" width="360" height="280" rx="24" fill="white" opacity=".07"/>
  <circle cx="540" cy="400" r="50" fill="white" opacity=".08"/>
  <circle cx="640" cy="460" r="35" fill="#a5b4fc" opacity=".1"/>
  <rect x="480" y="480" width="180" height="12" rx="6" fill="white" opacity=".08"/>
  <rect x="510" y="504" width="120" height="8" rx="4" fill="white" opacity=".06"/>

  <!-- RIGHT SIDE 40% -->
  <rect x="864" width="576" height="900" fill="#fafafa"/>

  <!-- Register form card -->
  <rect x="924" y="40" width="456" height="820" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Title -->
  <text x="1152" y="92" font-family="Inter,sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">Criar sua conta</text>

  <!-- Progress dots: Step 1 of 2 -->
  <text x="1152" y="116" font-family="Inter,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Etapa 1 de 2</text>
  <circle cx="1136" cy="136" r="5" fill="#6366f1"/>
  <circle cx="1156" cy="136" r="5" fill="#d1d5db"/>
  <line x1="1141" y1="136" x2="1151" y2="136" stroke="#d1d5db" stroke-width="1"/>

  <!-- Nome da Empresa -->
  <text x="968" y="180" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#374151">Nome da Empresa</text>
  <rect x="968" y="188" width="368" height="42" rx="8" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="988" y="214" font-size="15">🏢</text>
  <text x="1016" y="214" font-family="Inter,sans-serif" font-size="14" fill="#9ca3af">Sua empresa</text>

  <!-- CNPJ -->
  <text x="968" y="254" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#374151">CNPJ <tspan fill="#9ca3af" font-weight="400">(opcional)</tspan></text>
  <rect x="968" y="262" width="368" height="42" rx="8" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="988" y="288" font-family="Inter,sans-serif" font-size="14" fill="#9ca3af">00.000.000/0000-00</text>

  <!-- Nome -->
  <text x="968" y="328" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#374151">Nome completo</text>
  <rect x="968" y="336" width="368" height="42" rx="8" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="988" y="362" font-size="15">👤</text>
  <text x="1016" y="362" font-family="Inter,sans-serif" font-size="14" fill="#9ca3af">Seu nome</text>

  <!-- Email -->
  <text x="968" y="402" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#374151">Email</text>
  <rect x="968" y="410" width="368" height="42" rx="8" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="988" y="436" font-size="15">📧</text>
  <text x="1016" y="436" font-family="Inter,sans-serif" font-size="14" fill="#9ca3af">seu@email.com</text>

  <!-- Senha -->
  <text x="968" y="476" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#374151">Senha</text>
  <rect x="968" y="484" width="368" height="42" rx="8" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="988" y="510" font-size="15">🔒</text>
  <text x="1016" y="510" font-family="Inter,sans-serif" font-size="14" fill="#9ca3af">Mínimo 8 caracteres</text>
  <!-- Eye icon -->
  <g transform="translate(1312,496)" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round">
    <path d="M1 7s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z"/>
    <circle cx="9" cy="7" r="2.5"/>
  </g>

  <!-- Strength indicator -->
  <rect x="968" y="532" width="120" height="4" rx="2" fill="#22c55e"/>
  <rect x="1092" y="532" width="120" height="4" rx="2" fill="#d1d5db"/>
  <rect x="1216" y="532" width="120" height="4" rx="2" fill="#d1d5db"/>
  <text x="968" y="550" font-family="Inter,sans-serif" font-size="11" fill="#22c55e">Média</text>

  <!-- Confirmar Senha -->
  <text x="968" y="576" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#374151">Confirmar Senha</text>
  <rect x="968" y="584" width="368" height="42" rx="8" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="988" y="610" font-size="15">🔒</text>
  <text x="1016" y="610" font-family="Inter,sans-serif" font-size="14" fill="#9ca3af">Repita a senha</text>

  <!-- Terms checkbox -->
  <rect x="968" y="648" width="16" height="16" rx="4" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="992" y="661" font-family="Inter,sans-serif" font-size="13" fill="#374151">Aceito os <tspan fill="#6366f1">termos de uso</tspan> e <tspan fill="#6366f1">política de privacidade</tspan></text>

  <!-- Criar Conta button -->
  <rect x="968" y="690" width="368" height="46" rx="10" fill="#6366f1"/>
  <text x="1138" y="718" font-family="Inter,sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Criar Conta</text>
  <text x="1186" y="719" font-family="Inter,sans-serif" font-size="16" fill="white">→</text>

  <!-- Bottom link -->
  <text x="1152" y="770" font-family="Inter,sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Já tem conta?
    <tspan fill="#6366f1" font-weight="600"> Entrar</tspan>
  </text>
</svg>
