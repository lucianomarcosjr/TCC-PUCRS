    <!-- Templates Section -->
    <text x="32" y="660" fill="#111827" font-size="18" font-weight="700">Templates Populares</text>
    <!-- Template 1 -->
    <g transform="translate(32,676)">
      <rect width="350" height="110" rx="10" fill="#fff" stroke="#e5e7eb"/>
      <text x="20" y="30" fill="#111827" font-size="14" font-weight="600">🚀 Onboarding</text>
      <text x="20" y="52" fill="#6b7280" font-size="12">Guie novos clientes com</text>
      <text x="20" y="68" fill="#6b7280" font-size="12">mensagens automáticas</text>
      <rect x="20" y="80" width="110" height="24" rx="6" fill="#eef2ff"/>
      <text x="75" y="96" fill="#6366f1" font-size="12" text-anchor="middle">Usar Template</text>
    </g>
    <!-- Template 2 -->
    <g transform="translate(402,676)">
      <rect width="350" height="110" rx="10" fill="#fff" stroke="#e5e7eb"/>
      <text x="20" y="30" fill="#111827" font-size="14" font-weight="600">⭐ Pesquisa NPS</text>
      <text x="20" y="52" fill="#6b7280" font-size="12">Envie pesquisa de satisfação</text>
      <text x="20" y="68" fill="#6b7280" font-size="12">após encerrar conversa</text>
      <rect x="20" y="80" width="110" height="24" rx="6" fill="#eef2ff"/>
      <text x="75" y="96" fill="#6366f1" font-size="12" text-anchor="middle">Usar Template</text>
    </g>
    <!-- Template 3 -->
    <g transform="translate(772,676)">
      <rect width="350" height="110" rx="10" fill="#fff" stroke="#e5e7eb"/>
      <text x="20" y="30" fill="#111827" font-size="14" font-weight="600">📋 Follow-up</text>
      <text x="20" y="52" fill="#6b7280" font-size="12">Acompanhe clientes inativos</text>
      <text x="20" y="68" fill="#6b7280" font-size="12">há mais de 7 dias</text>
      <rect x="20" y="80" width="110" height="24" rx="6" fill="#eef2ff"/>
      <text x="75" y="96" fill="#6366f1" font-size="12" text-anchor="middle">Usar Template</text>
    </g>
