      <text x="24" y="32" fill="#111827" font-size="16" font-weight="700">🏷️ Tag Urgente</text>
      <!-- Toggle OFF -->
      <rect x="1040" y="14" width="44" height="24" rx="12" fill="#d1d5db"/>
      <circle cx="1052" cy="26" r="9" fill="#fff"/>
      <text x="24" y="60" fill="#6b7280" font-size="12" font-weight="600">Quando:</text>
      <rect x="80" y="46" width="130" height="24" rx="6" fill="#eef2ff"/>
      <text x="90" y="63" fill="#6366f1" font-size="12">Nova conversa</text>
      <text x="224" y="63" fill="#9ca3af" font-size="16">→</text>
      <text x="250" y="60" fill="#6b7280" font-size="12" font-weight="600">Então:</text>
      <rect x="296" y="46" width="150" height="24" rx="6" fill="#f0fdf4"/>
      <text x="306" y="63" fill="#10b981" font-size="12">Enviar mensagem</text>
      <rect x="24" y="80" width="1072" height="28" rx="6" fill="#f9fafb"/>
      <text x="36" y="99" fill="#6b7280" font-size="12" font-style="italic">"Seu caso foi marcado como urgente. Prioridade máxima!"</text>
      <text x="24" y="134" fill="#9ca3af" font-size="12">🕐 Seg-Sex • 08:00-18:00</text>
      <rect x="960" y="116" width="70" height="28" rx="6" fill="none" stroke="#d1d5db"/>
      <text x="995" y="135" fill="#6b7280" font-size="12" text-anchor="middle">Editar</text>
      <rect x="1040" y="116" width="70" height="28" rx="6" fill="none" stroke="#fecaca"/>
      <text x="1075" y="135" fill="#ef4444" font-size="12" text-anchor="middle">Excluir</text>
