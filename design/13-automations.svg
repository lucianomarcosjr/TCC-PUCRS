    <!-- Header -->
    <text x="32" y="100" fill="#111827" font-size="24" font-weight="700">Automações</text>
    <text x="32" y="120" fill="#6b7280" font-size="13">Automatize respostas e ações</text>
    <rect x="1000" y="80" width="160" height="40" rx="8" fill="#6366f1"/>
    <text x="1080" y="105" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">+ Nova Automação</text>

    <!-- Card 1: Boas-vindas (active) -->
    <g transform="translate(32,148)">
      <rect width="1120" height="150" rx="12" fill="#fff" stroke="#e5e7eb"/>
      <text x="24" y="32" fill="#111827" font-size="16" font-weight="700">🎉 Boas-vindas</text>
      <!-- Toggle ON -->
      <rect x="1040" y="14" width="44" height="24" rx="12" fill="#10b981"/>
      <circle cx="1072" cy="26" r="9" fill="#fff"/>
      <!-- Flow -->
      <text x="24" y="60" fill="#6b7280" font-size="12" font-weight="600">Quando:</text>
      <rect x="80" y="46" width="130" height="24" rx="6" fill="#eef2ff"/>
      <text x="90" y="63" fill="#6366f1" font-size="12">Nova conversa</text>
      <text x="224" y="63" fill="#9ca3af" font-size="16">→</text>
      <text x="250" y="60" fill="#6b7280" font-size="12" font-weight="600">Então:</text>
