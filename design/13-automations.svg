      <rect x="24" y="80" width="1072" height="28" rx="6" fill="#f9fafb"/>
      <text x="36" y="99" fill="#6b7280" font-size="12" font-style="italic">"Olá! Bem-vindo ao OmniFlow. Como posso ajudar?"</text>
