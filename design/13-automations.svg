      <text x="24" y="134" fill="#9ca3af" font-size="12">🕐 Seg-Sex • 08:00-18:00</text>
      <rect x="960" y="116" width="70" height="28" rx="6" fill="none" stroke="#d1d5db"/>
      <text x="995" y="135" fill="#6b7280" font-size="12" text-anchor="middle">Editar</text>
      <rect x="1040" y="116" width="70" height="28" rx="6" fill="none" stroke="#fecaca"/>
      <text x="1075" y="135" fill="#ef4444" font-size="12" text-anchor="middle">Excluir</text>
    </g>

    <!-- Card 2: Fora do Horário (active) -->
    <g transform="translate(32,310)">
      <rect width="1120" height="150" rx="12" fill="#fff" stroke="#e5e7eb"/>
