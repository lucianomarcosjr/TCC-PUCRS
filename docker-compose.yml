version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: omniflow-postgres
    environment:
      POSTGRES_DB: omniflow
      POSTGRES_USER: omniflow
      POSTGRES_PASSWORD: omniflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: omniflow-mongodb
    environment:
      MONGO_INITDB_DATABASE: omniflow
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omniflow-backend
    shm_size: '256mb'
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgresql://omniflow:omniflow123@postgres:5432/omniflow
      MONGODB_URI: mongodb://mongodb:27017/omniflow
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRES_IN: 24h
      ENCRYPTION_KEY: dev-encryption-key-32-chars-min
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - wwebjs_auth:/app/.wwebjs_auth
    command: npm run dev

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: omniflow-frontend
    environment:
      VITE_API_URL: http://localhost:3333
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend-react/src:/app/src

volumes:
  postgres_data:
  mongodb_data:
  wwebjs_auth:
